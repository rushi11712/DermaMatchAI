<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DermaMatch AI | Professional Assessment</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-white text-slate-800 font-sans">

    <header class="py-6 border-b border-slate-100 sticky top-0 bg-white/90 backdrop-blur-md z-50">
        <div class="max-w-3xl mx-auto px-4 relative">
            <button id="back-btn" onclick="goBack()" class="absolute left-4 top-1/2 -translate-y-1/2 p-2 rounded-full hover:bg-slate-50 transition hidden">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
                </svg>
            </button>

            <h1 class="text-2xl font-black text-teal-600 text-center uppercase tracking-[0.2em]">DermaMatch</h1>
            
            <div class="flex justify-between items-center relative mt-8 max-w-xs mx-auto">
                <div class="absolute top-1/2 left-0 w-full h-[2px] bg-slate-100 -z-10"></div>
                <div id="progress-bar-line" class="absolute top-1/2 left-0 h-[2px] bg-teal-500 transition-all duration-500 -z-10" style="width: 0%"></div>
                
                <div class="step-indicator" data-step="1"><div class="w-3 h-3 rounded-full bg-slate-200 transition-colors duration-500"></div></div>
                <div class="step-indicator" data-step="2"><div class="w-3 h-3 rounded-full bg-slate-200 transition-colors duration-500"></div></div>
                <div class="step-indicator" data-step="3"><div class="w-3 h-3 rounded-full bg-slate-200 transition-colors duration-500"></div></div>
            </div>
        </div>
    </header>

    <main id="app-container" class="max-w-2xl mx-auto py-12 px-6">
        </main>

    <script src="main.js"></script>
</body>
</html>
</html>
